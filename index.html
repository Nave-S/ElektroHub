<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElektroHub – Elektro-Fachbetrieb Management</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="vendor/big.min.js"></script>
  <script src="vendor/qrious.min.js" defer></script>
  <script src="vendor/tesseract.min.js" defer></script>
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1>⚡ ElektroHub</h1>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="version" id="app-version">v2.0</span>
          <span style="font-size:0.6rem;padding:1px 6px;border-radius:4px;background:#fbbf24;color:#78350f;font-weight:600;">PROTOTYP</span>
        </div>
      </div>
      <div style="padding:8px 12px;">
        <input type="text" id="global-search" placeholder="🔍 Suchen..." oninput="GlobalSearch.search(this.value)" onfocus="GlobalSearch.open()" style="width:100%;padding:7px 10px;border:1px solid var(--gray-700);border-radius:6px;background:var(--gray-800);color:white;font-size:0.85rem;outline:none;">
        <div id="global-search-results" style="display:none;"></div>
      </div>
      <ul class="nav-menu">
        <li class="nav-item active" data-view="dashboard">
          <span class="nav-icon">🏠</span> Dashboard
        </li>
        <li class="nav-item" data-view="customers">
          <span class="nav-icon">👥</span> Kunden
        </li>
        <li class="nav-item" data-view="projects">
          <span class="nav-icon">📋</span> Projekte
        </li>
        <li class="nav-item" data-view="invoices">
          <span class="nav-icon">📄</span> Belege
        </li>
        <li class="nav-item" data-view="timetracking">
          <span class="nav-icon">⏱️</span> Zeiterfassung
        </li>
        <li class="nav-item" data-view="inspections">
          <span class="nav-icon">🔌</span> Prüfprotokolle
        </li>
        <li class="nav-item" data-view="statistics">
          <span class="nav-icon">📊</span> Statistiken
        </li>
        <li class="nav-item" data-view="inventory" id="nav-inventory" style="display:none;">
          <span class="nav-icon">📦</span> Lager
        </li>
        <li class="nav-item" data-view="qrforge">
          <span class="nav-icon">⬡</span> QR Forge
        </li>
        <li class="nav-item" data-view="settings">
          <span class="nav-icon">⚙️</span> Einstellungen
        </li>
      </ul>
      <div class="sidebar-footer">
        <div id="autosave-status"></div>
        <button class="sidebar-help-btn" onclick="openGuideWindow()">❓ Anleitung & Hilfe</button>
        <button class="sidebar-help-btn" onclick="app.navigate('appinfo')" style="font-size:0.8rem;padding:8px 12px;">ℹ️ Über ElektroHub</button>
        <button id="btn-export" class="btn-secondary btn-small">Daten exportieren</button>
        <button id="btn-import" class="btn-secondary btn-small">Daten importieren</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
    </nav>

    <main id="content">
      <!-- Views werden dynamisch geladen -->
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Textbaustein-Picker Overlay (über dem Modal) -->
  <div id="picker-overlay" class="picker-overlay hidden">
    <div class="picker-panel">
      <div class="picker-header">
        <h3 id="picker-title">Textbaustein einfügen</h3>
        <button class="modal-close" onclick="closePicker()">&times;</button>
      </div>
      <div class="picker-body" id="picker-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <script src="js/db.js"></script>
  <script src="js/qrcode.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/textblocks.js"></script>
  <script src="js/changelog.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/validator.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/projects.js"></script>
  <script src="js/views/customers.js"></script>
  <script src="js/views/inventory.js"></script>
  <script src="js/views/invoices.js"></script>
  <script src="js/views/timetracking.js"></script>
  <script src="js/views/inspections.js"></script>
  <script src="js/views/statistics.js"></script>
  <script src="js/views/guide.js"></script>
  <script src="js/views/appinfo.js"></script>
  <script src="js/search.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/autosave.js"></script>
  <script src="js/audit.js"></script>
  <script src="js/datev-export.js"></script>
  <script src="js/signature.js"></script>
  <script src="js/photos.js"></script>
  <script src="js/ocr-import.js"></script>
  <script src="js/views/qrforge.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/app.js"></script>
  <script src="js/updater-ui.js"></script>
</body>
</html>
